{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codeforces Solve Checker</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'checker/css/style.css' %}">
    <style>
        .sticky-controls {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans" style="min-width: 90%;">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight mb-2">
                CF Solve Checker
            </h1>
            <p class="text-slate-500">Track student problem-solving activity on Codeforces.</p>
        </header>

        <!-- Main Controls -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-8 border border-slate-200">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- Data Selection -->
                <div class="space-y-4">
                    <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Data Sources</h2>
                    <div class="flex flex-col gap-4">
                        <div class="flex flex-col sm:flex-row gap-2">
                            <button id="uploadBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-lg transition-colors flex items-center justify-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 6.707a1 1 0 010-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 01-1.414 1.414L11 5.414V13a1 1 0 11-2 0V5.414L7.707 6.707a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                                </svg>
                                Upload CSV
                            </button>
                            <input type="file" id="csvFileInput" class="hidden" accept=".csv">
                        </div>
                        <div class="flex flex-col sm:flex-row gap-2">
                            <select id="listSelect" class="flex-1 border border-indigo-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                                <option value="">Select Saved List...</option>
                            </select>
                        </div>
                        <div class="flex flex-col sm:flex-row gap-2">
                            <button id="loadSavedBtn" class="bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 font-medium py-2.5 px-6 rounded-lg transition-colors flex items-center justify-center gap-2 whitespace-nowrap">
                                Load Students
                            </button>
                            <button id="clearListsBtn" class="bg-white border border-red-200 hover:bg-red-50 text-red-600 font-medium py-2.5 px-4 rounded-lg transition-colors flex items-center justify-center gap-2 whitespace-nowrap" title="Clear all saved lists">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                                </svg>
                                Clear
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Date and Action -->
                <div class="space-y-4">
                    <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Period & Action</h2>
                    <div class="flex flex-col gap-4">
                        <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-lg border border-slate-100">
                            <label for="daysInput" class="text-sm font-medium text-slate-600 whitespace-nowrap">Check activity for the last</label>
                            <div class="relative">
                                <input type="number" id="daysInput" value="1" min="1" class="w-24 border border-slate-300 rounded-lg pl-3 pr-10 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                                <span class="absolute right-3 top-2 text-sm text-slate-400">days</span>
                            </div>
                        </div>
                        <button id="checkSolvesBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 px-6 rounded-lg transition-all shadow-md hover:shadow-lg active:scale-[0.98] flex items-center justify-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                            </svg>
                            Check CF History
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Summary & Layout -->
        <div id="statsContainer" class="hidden"></div>
        
        <div class="flex flex-col lg:flex-row gap-8 items-start">
            <!-- Table Area -->
            <div class="flex-1 w-full space-y-4" id="studentsList">
                <p class="text-gray-500 text-center py-8 italic">Load students to see data...</p>
            </div>

            <!-- Error Log Area -->
            <div id="errorLogContainer" class="w-full lg:w-80 bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden sticky top-8">
                <div class="bg-slate-50 border-b border-slate-200 px-4 py-3 flex items-center justify-between">
                    <h3 class="text-xs font-bold text-slate-700 uppercase tracking-wider flex items-center gap-2">
                        <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
                        Error Log
                    </h3>
                    <button id="clearLogBtn" class="text-[10px] text-slate-400 hover:text-red-500 uppercase font-bold transition-colors">Clear</button>
                </div>
                <div id="errorLog" class="p-4 space-y-3 text-[11px] font-mono text-red-600 max-h-[400px] overflow-y-auto bg-slate-50/50">
                    <p class="text-slate-400 italic text-center py-4">No errors reported.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay (kept for global state) -->
    <div id="loadingOverlay" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 hidden">
        <div class="bg-white p-8 rounded-2xl shadow-2xl text-center max-w-xs w-full">
            <div class="loading-spinner mx-auto mb-4"></div>
            <h3 class="font-bold text-slate-800 text-lg">Processing</h3>
            <p id="loadingText" class="text-slate-500 text-sm">Please wait while we check all students...</p>
        </div>
    </div>

    <!-- JS Logic -->
    <script src="{% static 'checker/js/script.js' %}"></script>
</body>
</html>
